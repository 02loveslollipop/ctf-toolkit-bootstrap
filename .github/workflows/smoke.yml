name: smoke

on:
  pull_request:

jobs:
  bootstrap-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          activate-environment: ""
          python-version: "3.12"

      - name: Validate shell scripts
        run: |
          bash -n scripts/_installer_bootstrap.sh
          bash -n scripts/install.sh
          bash -n scripts/install_headless.sh
          bash -n scripts/update_headless.sh
          bash -n scripts/verify.sh
          bash -n scripts/uninstall.sh
          bash -n scripts/sync_skills.sh
          bash -n scripts/remove_skills.sh
          bash -n scripts/opencrow-stego-mcp
          bash -n scripts/opencrow-forensics-mcp
          bash -n scripts/opencrow-osint-mcp
          bash -n scripts/opencrow-web-mcp
          bash -n scripts/opencrow-crypto-mcp
          bash -n scripts/opencrow-pwn-mcp
          bash -n scripts/opencrow-reversing-mcp
          bash -n scripts/opencrow-network-mcp
          bash -n scripts/opencrow-utility-mcp
          bash -n scripts/opencrow-netcat-mcp
          bash -n scripts/opencrow-ssh-mcp
          bash -n scripts/opencrow-minecraft-mcp
          python3 -m py_compile scripts/tool_catalog.py
          python3 -m py_compile scripts/install_cli.py
          python3 -m py_compile scripts/check_mcp_server.py
          python3 -m py_compile scripts/opencrow_mcp_core.py
          python3 -m py_compile scripts/opencrow_ctf_mcp_common.py
          python3 -m py_compile scripts/opencrow_io_mcp_common.py
          python3 -m py_compile scripts/opencrow_crypto_mcp.py
          python3 -m py_compile scripts/opencrow_pwn_mcp.py
          python3 -m py_compile scripts/opencrow_reversing_mcp.py
          python3 -m py_compile scripts/opencrow_network_mcp.py
          python3 -m py_compile scripts/opencrow_utility_mcp.py
          python3 -m py_compile scripts/opencrow_stego_mcp.py
          python3 -m py_compile scripts/opencrow_forensics_mcp.py
          python3 -m py_compile scripts/opencrow_osint_mcp.py
          python3 -m py_compile scripts/opencrow_web_mcp.py
          python3 -m py_compile scripts/opencrow_netcat_mcp.py
          python3 -m py_compile scripts/opencrow_ssh_mcp.py
          python3 -m py_compile scripts/opencrow_minecraft_mcp.py

      - name: Dry-run installer
        run: bash scripts/install_headless.sh --env ctf --dry-run

      - name: Dry-run skill sync
        run: |
          mkdir -p "$HOME/.codex/skills"
          bash scripts/sync_skills.sh --dry-run
          bash scripts/remove_skills.sh --dry-run

      - name: Smoke Makefile
        run: make smoke ENV=ctf

  bootstrap-install:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          activate-environment: ""
          python-version: "3.12"

      - name: Real headless install
        run: bash scripts/install_headless.sh --env ctf --profile headless --all-toolboxes

      - name: Verify managed install
        run: bash scripts/verify.sh --env ctf

      - name: Check synced skill directories
        run: |
          for skill_dir in \
            "$HOME/.codex/skills/opencrow-crypto-toolbox" \
            "$HOME/.codex/skills/opencrow-forensics-toolbox" \
            "$HOME/.codex/skills/opencrow-network-toolbox" \
            "$HOME/.codex/skills/opencrow-osint-toolbox" \
            "$HOME/.codex/skills/opencrow-pwn-toolbox" \
            "$HOME/.codex/skills/opencrow-reversing-toolbox" \
            "$HOME/.codex/skills/opencrow-stego-toolbox" \
            "$HOME/.codex/skills/opencrow-utility-toolbox" \
            "$HOME/.codex/skills/opencrow-web-toolbox"
          do
            test -d "$skill_dir"
          done

      - name: Verify synced toolbox scripts
        run: |
          python3 "$HOME/.codex/skills/opencrow-crypto-toolbox/scripts/verify_toolkit.py"
          python3 "$HOME/.codex/skills/opencrow-forensics-toolbox/scripts/verify_toolkit.py"
          python3 "$HOME/.codex/skills/opencrow-network-toolbox/scripts/verify_toolkit.py"
          python3 "$HOME/.codex/skills/opencrow-osint-toolbox/scripts/verify_toolkit.py"
          python3 "$HOME/.codex/skills/opencrow-pwn-toolbox/scripts/verify_toolkit.py"
          python3 "$HOME/.codex/skills/opencrow-reversing-toolbox/scripts/verify_toolkit.py"
          python3 "$HOME/.codex/skills/opencrow-stego-toolbox/scripts/verify_toolkit.py"
          python3 "$HOME/.codex/skills/opencrow-utility-toolbox/scripts/verify_toolkit.py"
          python3 "$HOME/.codex/skills/opencrow-web-toolbox/scripts/verify_toolkit.py"

      - name: Probe first-wave MCP servers
        run: |
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-stego-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-forensics-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-osint-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-web-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-crypto-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-pwn-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-reversing-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-network-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-utility-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-netcat-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-ssh-mcp"
          python3 scripts/check_mcp_server.py "$HOME/.local/bin/opencrow-minecraft-mcp"
